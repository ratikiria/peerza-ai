<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="flame-outer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a" stop-opacity="0.95" />
      <stop offset="40%"  stop-color="#fb923c" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="flame-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fde047" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Rounded-square emerald background, iOS-style 22% corner radius -->
  <rect width="1024" height="1024" rx="225" fill="url(#bg)" />

  <!-- Peerza rocket-bowl P logomark, centered -->
  <svg x="328" y="212" width="368" height="600" viewBox="0 0 22 36">
    <!-- Layered flame trail under stem -->
    <path
      d="M2.0 29.8 Q1.6 33.2 5 36.6 Q8.4 33.2 8.0 29.8 Q7 31 6 30.2 Q5 31.5 4 30.2 Q3 31 2.0 29.8 Z"
      fill="url(#flame-outer)"
    />
    <ellipse cx="5" cy="31" rx="1" ry="2" fill="url(#flame-mid)" />

    <!-- Bowl (white) -->
    <circle cx="10" cy="10" r="7.5" fill="#ffffff" />

    <!-- Inner amber circle inside bowl -->
    <circle cx="12.7" cy="10" r="4.5" fill="#fbbf24" />

    <!-- Crater shading + highlight -->
    <circle cx="14.3" cy="8.3"  r="0.5"  fill="#b45309" fill-opacity="0.32" />
    <circle cx="11.8" cy="11.6" r="0.36" fill="#b45309" fill-opacity="0.26" />
    <circle cx="11.7" cy="9" r="1.3" fill="#ffffff" fill-opacity="0.5" />

    <!-- Stem (white) -->
    <rect x="2" y="3" width="6" height="27" rx="1" fill="#ffffff" />

    <!-- Nose cone -->
    <path d="M2 3 L8 3 L5 -1.2 Z" fill="#ffffff" />

    <!-- Two fins -->
    <path d="M8 22 L11 28.6 L8 26 Z" fill="#ffffff" fill-opacity="0.78" />
    <path d="M2 22 L-1 28.6 L2 26 Z" fill="#ffffff" fill-opacity="0.78" />

    <!-- Porthole -->
    <circle cx="5" cy="20" r="1.6" fill="#047857" />
    <circle cx="5" cy="20" r="0.95" fill="#34d399" />
    <circle cx="4.55" cy="19.55" r="0.4" fill="#ffffff" fill-opacity="0.85" />
  </svg>
</svg>
