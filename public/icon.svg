<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Rounded-square emerald background, iOS-style 22% corner radius -->
  <rect width="1024" height="1024" rx="225" fill="url(#bg)" />

  <!-- Peerza rocket-bowl P logomark, centered at ~50% scale of canvas -->
  <svg x="328" y="212" width="368" height="600" viewBox="0 0 22 36">
    <!-- Flame trail under stem -->
    <path d="M2 30 L5 36 L8 30 L6 32 L5 30 L4 32 Z" fill="url(#flame)" />

    <!-- Bowl (white) — round head of the P -->
    <circle cx="10" cy="10" r="7.5" fill="#ffffff" />

    <!-- Inner amber circle inside bowl -->
    <circle cx="12.7" cy="10" r="4.5" fill="#fbbf24" />

    <!-- Stem (white) -->
    <rect x="2" y="3" width="6" height="27" rx="0.9" fill="#ffffff" />

    <!-- Nose cone -->
    <path d="M2 3 L8 3 L5 -0.5 Z" fill="#ffffff" />

    <!-- Right fin -->
    <path d="M8 22 L11 28 L8 26 Z" fill="rgba(255,255,255,0.75)" />

    <!-- Porthole -->
    <circle cx="5" cy="20" r="1.6" fill="#047857" />
    <circle cx="5" cy="20" r="0.95" fill="#34d399" />
    <circle cx="4.55" cy="19.55" r="0.4" fill="rgba(255,255,255,0.85)" />
  </svg>
</svg>
